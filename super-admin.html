<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SaleStation - Super Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="shortcut icon" href="./icon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="shared.css" />
    <style>
        body {
            visibility: hidden;
        }
    </style>
</head>

<body>
    <!-- APP SHELL -->
    <div id="app-container">
        <div id="sidebar-overlay" onclick="closeMobileSidebar()"></div>
        <aside id="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-inner">
                    <div class="sidebar-logo-icon"><img src="Logo-icon.png" alt="SaleStation"
                            style="width:22px;height:22px;object-fit:contain;filter:invert(1)" /></div>
                    <span class="sidebar-logo-text">SaleStation</span>
                </div>
                <button class="sidebar-close-btn" onclick="closeMobileSidebar()"><svg width="16" height="16" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        viewBox="0 0 24 24">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg></button>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <div class="nav-item" onclick="handleLogout()">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    <span class="nav-item-label">Logout</span>
                </div>
            </div>
        </aside>
        <div id="main-wrapper">
            <header id="topbar">
                <div class="topbar-left">
                    <button class="hamburger-btn" onclick="handleHamburger()"><svg width="16" height="16" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            viewBox="0 0 24 24">
                            <line x1="3" y1="12" x2="21" y2="12" />
                            <line x1="3" y1="6" x2="21" y2="6" />
                            <line x1="3" y1="18" x2="21" y2="18" />
                        </svg></button>
                    <span class="topbar-title" id="topbar-title">Dashboard</span>
                </div>
                <div class="topbar-right">
                    <div id="sub-status-badge"></div>
                    <div class="user-badge">
                        <div class="user-info">
                            <div class="user-info-name" id="topbar-user-name">User</div>
                            <div class="user-info-role" id="topbar-user-role">role</div>
                        </div>
                        <div class="user-avatar"><svg width="16" height="16" fill="none" stroke="#6a6a6a"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                <circle cx="12" cy="7" r="4" />
                            </svg></div>
                    </div>
                </div>
            </header>
            <div id="content-area"></div>
        </div>
    </div>

    <!-- MODAL -->
    <div id="modal-overlay" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span class="modal-title" id="modal-title">Modal</span>
                <button class="modal-close" onclick="closeModal()"><svg width="16" height="16" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        viewBox="0 0 24 24">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg></button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <!-- CONFIRM POPUP -->
    <div id="confirm-overlay" class="confirm-overlay">
        <div class="confirm-box">
            <h3 id="confirm-title">Confirm Action</h3>
            <p id="confirm-message"></p>
            <div class="confirm-actions">
                <button class="btn btn-outline" style="flex:1" id="confirm-cancel-btn">Cancel</button>
                <button class="btn btn-danger" style="flex:1" id="confirm-ok-btn">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Toast Containers -->
    <div id="toast-container" role="status" aria-live="polite" aria-atomic="false"></div>
    <div id="toast-container-assertive" role="alert" aria-live="assertive" aria-atomic="true"
        style="position:fixed;bottom:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden"></div>
    <div id="page-title-announce" role="status" aria-live="polite" aria-atomic="true"
        style="position:fixed;bottom:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden"></div>

    <!-- Session Warning -->
    <div id="session-warning">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
            <span>Session expiring in <strong id="session-countdown">2:00</strong></span>
            <button onclick="resetSessionTimer();document.getElementById('session-warning').classList.remove('show')"
                style="background:var(--black);color:var(--white);border:none;border-radius:2px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:var(--font-main)">
                Stay Logged In
            </button>
        </div>
    </div>

    <script src="shared.js"></script>
    <script src="super-admin.js"></script>
    <script>
        // Route guard: only super-admin allowed
        (function initSuperAdmin() {
            const store = getStore();
            if (!store.currentUser) {
                window.location.href = 'auth.html';
                return;
            }
            if (store.currentUser.role !== 'super-admin') {
                window.location.href = store.currentUser.role === 'cashier' ? 'cashier.html' : 'admin.html';
                return;
            }
            currentUser = store.currentUser;
            launchApp();
        })();
    </script>
</body>

</html>
